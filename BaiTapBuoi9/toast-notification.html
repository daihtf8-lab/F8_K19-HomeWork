<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Toast Notification</title>
</head>
<style>

    /*ẩn input*/
    input[type="checkbox"] {
        display: none;
    }

    /*ẩn thanh thông báo*/
    #toast-toggle {
        display: none;
    }

    /*định dạng nút bấm hiện thông báo*/
    label {
        display: inline-block;
        padding: 10px 20px;
        border: 1px solid;
        background-color: #333333;
        color: white;
        cursor: pointer;

    }

    /*định dạng nút bấm chính*/
    .open-btn {
        display: inline-block;
        padding: 20px 20px;
        border: 10px solid #333;
        background-color: #333333;
        color: white;
        cursor: pointer; /* Thêm hình bàn tay khi hover */
        border-radius: 5px;
        font-family: sans-serif;
        user-select: none; /* Chống bôi đen chữ */
    }

    /*định dạng thông báo*/
    .toast {
        display: none;
        padding: 15px 20px;
        background-color: #4CAF50; /* Màu xanh lá báo thành công */
        color: white;
        border-radius: 5px;
        width: fit-content;
        font-family: sans-serif;
        /* Dùng Flexbox để căn hàng ngang icon, chữ và nút X */
        align-items: center;
    }

    /*chuyển thẻ .toast từ none sang flex*/
    #toast-toggle:checked ~ .toast {
        display: inline-flex;
        margin-left: 30px;
    }

    .close-btn {
        cursor: pointer; /*ngón tay chỉ*/
        font-weight: bolder;
        font-size: 16px;
        margin-left: 30px;
        color: #ffffff;
        background-color: #4c914d;
    }

    /*xóa margin mặc định của p trong toast*/
    .toast p {
        margin: 0;
    }

</style>
<body>
    <input type="checkbox" id="toast-toggle">

    <label for="toast-toggle" class="open-btn">
        Hiện thông báo
    </label>

    <div class="toast">
        <p class="message">Lưu thành công!</p>
        <label for="toast-toggle" class="close-btn">X</label>
    </div>


</body>
</html>
