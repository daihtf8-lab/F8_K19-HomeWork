<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Reports</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
    <!--
      Phan tu nay co: tag(h1)
      Selector thang: h1 (tu base.css) vi duy nhat
      Mau hien thi: red
    -->
    <h1>REPORT PAGE</h1>
    <!--
      Phan tu nay co: tag(h2) + class(.title)
      Selector thang: .title (tu theme.css) vi do uu tien cao hon h2
      Mau hien thi: darkcyan
    -->
    <h2 class="title">Thong ke he thong</h2>
    <!--
      Phan tu nay co: tag(div) + class(.section) + id(#main)
      Selector thang: #main (tu base.css) vi do uu tien cao nhat
      Mau hien thi: cyan
    -->
    <div class="section" id="main">
        <!--
          Phan tu nay co: tag(p) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon p
          Mau hien thi: darkcyan
        -->
        <p class="title">Tong so hoc vien</p>
        <!--
          Phan tu nay co: tag(p) + class(.big)
          Selector thang: .big (tu base.css) vi do uu tien cao hon p
          Mau hien thi: brown
        -->
        <p class="big">Tong so khoa hoc</p>
        <!--
          Phan tu nay co: tag(p)
          Selector thang: p (tu base.css) vi duy nhat
          Mau hien thi: orange
        -->
        <p>Tong so don hang</p>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Doanh thu</p>
    </div>
</body>
</html>
