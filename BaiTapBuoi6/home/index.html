<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Home</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
    <!--
      Phan tu nay co: tag(h1) + class(.title) + id(#main)
      Selector thang: #main vi do uu tien cao nhat
      Mau hien thi: cyan
    -->
    <h1 class="title" id="main">HOME PAGE</h1>
    <!--
      Phan tu nay co: tag(p)
      Selector thang: p vi duy nhat
      Mau hien thi: orange
    -->
    <p>Gioi thieu he thong</p>
    <!--
      Phan tu nay co: tag(h2) + class(.title)
      Selector thang: .title vi do uu tien cao hon h2 va duoc override trong theme.css
      Mau hien thi: darkcyan
    -->
    <h2 class="title">Cac khoa hoc noi bat</h2>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: .section vi do uu tien cao hon h3
      Mau hien thi: purple
    -->
    <h3 class="section">HTML</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: .section vi do uu tien cao hon h3
      Mau hien thi: purple
    -->
    <h3 class="section">CSS</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: .section vi do uu tien cao hon h3
      Mau hien thi: purple
    -->
    <h3 class="section">Javascript</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: .section vi do uu tien cao hon h3
      Mau hien thi: purple
    -->
    <h3 class="section">Python</h3>
</body>
</html>
