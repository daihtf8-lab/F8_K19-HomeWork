<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Orders</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
    <!--
      Phan tu nay co: tag(h1) + inline style
      Selector thang: inline style vi do uu tien cao nhat
      Mau hien thi: blue
    -->
    <h1 style="color: blue">ORDERS PAGE</h1>
    <!--
      Phan tu nay co: tag(h2) + class(.title) + id(#special) + inline style
      Selector thang: inline style vi do uu tien cao nhat
      Mau hien thi: red
    -->
    <h2 class="title" id="special" style="color: red">Danh sach don hang</h2>

    <!--
      Phan tu nay co: tag(p) + inline style
      Selector thang: inline style vi do uu tien cao nhat
      Mau hien thi: green
    -->
    <p style="color: green">Don hang 001</p>
    <!--
      Phan tu nay co: tag(p) + inline style
      Selector thang: inline style vi do uu tien cao nhat
      Mau hien thi: aqua
    -->
    <p style="color: aqua">Don hang 002</p>
    <!--
      Phan tu nay co: tag(p) + class(.highlight)
      Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
      Mau hien thi: yellow
    -->
    <p class="highlight">Don hang 003</p>
    <!--
      Phan tu nay co: tag(p) + class(.highlight)
      Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
      Mau hien thi: yellow
    -->
    <p class="highlight">Don hang 004</p>

<!--    phần tử h2 có cả .title + #special + inline style — cái nào thắng
    inline style thắng
-->

</body>
</html>
