<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>
        .title{
            background-color: aqua;
        }

        .section{
            background-color: lightgreen;
        }

        .highlight{
            background-color: lightyellow;
        }

        .big{
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <div class="big">
        <!--
          Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style
          Selector thang: inline style vi do uu tien cao nhat
          Mau hien thi: red
        -->
        <h1 class="title" id="special" style="color: red">DASHBOARD</h1>
        <!--
          Phan tu nay co: tag(h2) + class(.section)
          Selector thang: .section (tu base.css) vi do uu tien cao hon h2
          Mau hien thi: purple
        -->
        <h2 class="section">Tong quan he thong</h2>

        <!--
          Phan tu nay co: tag(h3) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
          Mau hien thi: darkcyan
        -->
        <h3 class="title">Courses</h3>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Thong tin ve cac khoa hoc trong he thong</p>

        <!--
          Phan tu nay co: tag(h3) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
          Mau hien thi: darkcyan
        -->
        <h3 class="title">Students</h3>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Thong tin ve so luong hoc vien dang tham gia</p>

        <!--
          Phan tu nay co: tag(h3) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
          Mau hien thi: darkcyan
        -->
        <h3 class="title">Teachers</h3>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu theme.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Thong tin ve cac giang vien trong he thong</p>

        <!--
          Phan tu nay co: tag(h3) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
          Mau hien thi: darkcyan
        -->
        <h3 class="title">Orders</h3>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu theme.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Thong tin ve cac don hang da duoc dat</p>

        <!--
          Phan tu nay co: tag(h3) + class(.title)
          Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
          Mau hien thi: darkcyan
        -->
        <h3 class="title">Reports</h3>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: .highlight (tu theme.css) vi do uu tien cao hon p
          Mau hien thi: yellow
        -->
        <p class="highlight">Bao cao thong ke va doanh thu</p>
    </div>
</body>
</html>
