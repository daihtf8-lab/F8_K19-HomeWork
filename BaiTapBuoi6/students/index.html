<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Students</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
<!--
  Phan tu nay co: tag(h1) + id(#main)
  Selector thang: #main (tu base.css) vi do uu tien cao hon h1
  Mau hien thi: cyan
-->
<h1 id="main">STUDENTS PAGE</h1>
<!--
  Phan tu nay co: tag(h2) + class(.title)
  Selector thang: .title (tu theme.css) vi do uu tien cao hon h2
  Mau hien thi: darkcyan
-->
<h2 class="title">Danh sach hoc vien</h2>
<!--
  Phan tu nay co: tag(h3) + class(.title)
  Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
  Mau hien thi: darkcyan
-->
<h3 class="title">Nhom 1:</h3>
<!--
  Phan tu nay co: tag(p) + class(.highlight)
  Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
  Mau hien thi: yellow
-->
<p class="highlight">Nguyen Van A</p>
<!--
  Phan tu nay co: tag(p) + class(.highlight)
  Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
  Mau hien thi: yellow
-->
<p class="highlight">Tran Van B</p>
<!--
  Phan tu nay co: tag(h3) + class(.title)
  Selector thang: .title (tu theme.css) vi do uu tien cao hon h3
  Mau hien thi: darkcyan
-->
<h3 class="title">Nhom 2:</h3>
<!--
  Phan tu nay co: tag(p) + class(.highlight)
  Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
  Mau hien thi: yellow
-->
<p class="highlight">Le Van C</p>
<!--
  Phan tu nay co: tag(p) + class(.highlight)
  Selector thang: .highlight (tu base.css) vi do uu tien cao hon p
  Mau hien thi: yellow
-->
<p class="highlight">Pham Van D</p>
</body>
</html>
