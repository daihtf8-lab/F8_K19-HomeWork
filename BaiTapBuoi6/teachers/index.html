<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Teacher</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        h3.section {
            color: red;
            background-color: green;
        }
    </style>
</head>
<body>
    <!--
      Phan tu nay co: tag(h1)
      Selector thang: h1 (tu base.css) vi duy nhat
      Mau hien thi: red
    -->
    <h1>TEACHERS PAGE</h1>
    <!--
      Phan tu nay co: tag(h2) + class(.title) + id(#special)
      Selector thang: #special (tu theme.css) vi do uu tien cao nhat
      Mau hien thi: pink
    -->
    <h2 class="title" id="special">Danh sach giang vien</h2>

    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: h3.section (internal) vi do uu tien cao hon .section va internal
      Mau hien thi: red
    -->
    <h3 class="section">Giang vien HTML</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: h3.section (internal) vi do uu tien cao hon .section va internal
      Mau hien thi: red
    -->
    <h3 class="section">Giang vien CSS</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: h3.section (internal) vi do uu tien cao hon .section va internal
      Mau hien thi: red
    -->
    <h3 class="section">Giang vien Javascript</h3>
    <!--
      Phan tu nay co: tag(h3) + class(.section)
      Selector thang: h3.section (internal) vi do uu tien cao hon .section va internal
      Mau hien thi: red
    -->
    <h3 class="section">Giang vien React</h3>
</body>
</html>
