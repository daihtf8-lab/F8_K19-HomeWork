<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Courses</title>


    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">

    <style>
        h1 {
            color: blue;
        }

        div.section {
            background-color: green;
        }

        p.highlight {
            color: black;
        }
    </style>
</head>
<body>
    <!--
      Phan tu nay co: tag(h1)
      Selector thang: h1 (internal) vi internal CSS uu tien hon external
      Mau hien thi: blue
    -->
    <h1>COURSES PAGE</h1>
    <!--
      Phan tu nay co: tag(h2) + class(.title)
      Selector thang: .title (tu theme.css) vi do uu tien cao nhat
      Mau hien thi: darkcyan
    -->
    <h2 class="title">Danh sach khoa hoc</h2>
    <!--
      Phan tu nay co: tag(div) + class(.section)
      Selector thang: .section (tu base.css) vi khong co internal color, chi background
      Mau hien thi: purple (cho color)
    -->
    <div class="section">
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: p.highlight (internal) vi do uu tien cao hon .highlight va internal
          Mau hien thi: black
        -->
        <p class="highlight">HTML co ban</p>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: p.highlight (internal) vi do uu tien cao hon .highlight va internal
          Mau hien thi: black
        -->
        <p class="highlight">CSS co ban</p>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: p.highlight (internal) vi do uu tien cao hon .highlight va internal
          Mau hien thi: black
        -->
        <p class="highlight">Javascript nang cao</p>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: p.highlight (internal) vi do uu tien cao hon .highlight va internal
          Mau hien thi: black
        -->
        <p class="highlight">ReactJS</p>
        <!--
          Phan tu nay co: tag(p) + class(.highlight)
          Selector thang: p.highlight (internal) vi do uu tien cao hon .highlight va internal
          Mau hien thi: black
        -->
        <p class="highlight">NodeJS</p>
    </div>








</body>
</html>
